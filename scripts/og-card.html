<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1200px; height: 630px; }
      body {
        position: relative;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background:
          radial-gradient(120% 140% at 18% 12%, #14102e 0%, transparent 55%),
          radial-gradient(120% 140% at 88% 90%, #0a1f33 0%, transparent 52%),
          #05060f;
        color: #e8eaf6;
      }
      /* glow behind the wordmark */
      .glow {
        position: absolute;
        left: 50%;
        top: 44%;
        width: 900px;
        height: 520px;
        transform: translate(-50%, -50%);
        background: radial-gradient(closest-side, rgba(139,92,246,0.28), transparent 70%);
        filter: blur(6px);
      }
      .content {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 0 100px;
        z-index: 3;
      }
      .eyebrow {
        font-size: 24px;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: #8b91b3;
        font-weight: 600;
        margin-bottom: 28px;
      }
      .eyebrow b { color: #8b5cf6; font-weight: 600; }
      h1 {
        font-size: 92px;
        line-height: 1.02;
        font-weight: 800;
        letter-spacing: -0.025em;
        max-width: 940px;
      }
      h1 .grad {
        background: linear-gradient(90deg, #8b5cf6 0%, #22d3ee 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .sub {
        margin-top: 34px;
        font-size: 30px;
        color: #8b91b3;
        font-weight: 500;
      }
      /* SVG star/comet field sits above the bg, below the text */
      svg.stars { position: absolute; inset: 0; z-index: 2; }
    </style>
  </head>
  <body>
    <div class="glow"></div>
    <svg class="stars" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
      <defs>
        <linearGradient id="comet" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#22d3ee" stop-opacity="0" />
          <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.9" />
        </linearGradient>
        <radialGradient id="starGlow">
          <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95" />
          <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0" />
        </radialGradient>
      </defs>
      <!-- scattered stars -->
      <g fill="#e8eaf6">
        <circle cx="120" cy="90" r="2.4" opacity="0.8" />
        <circle cx="240" cy="180" r="1.6" opacity="0.5" />
        <circle cx="980" cy="120" r="2" opacity="0.7" />
        <circle cx="1080" cy="240" r="1.4" opacity="0.5" />
        <circle cx="1130" cy="420" r="2.2" opacity="0.7" />
        <circle cx="900" cy="520" r="1.5" opacity="0.5" />
        <circle cx="180" cy="520" r="1.8" opacity="0.6" />
        <circle cx="60" cy="360" r="1.3" opacity="0.45" />
        <circle cx="1040" cy="560" r="1.6" opacity="0.5" />
        <circle cx="760" cy="70" r="1.4" opacity="0.5" />
      </g>
      <!-- glowing supernova accents -->
      <circle cx="1010" cy="180" r="46" fill="url(#starGlow)" />
      <circle cx="150" cy="470" r="38" fill="url(#starGlow)" />
      <circle cx="1010" cy="180" r="4" fill="#fff" />
      <circle cx="150" cy="470" r="3.2" fill="#fff" />
      <!-- comet streak -->
      <path d="M 760 540 L 1100 300" stroke="url(#comet)" stroke-width="3.5" stroke-linecap="round" />
      <circle cx="1100" cy="300" r="5" fill="#22d3ee" />
    </svg>
    <div class="content">
      <div class="eyebrow">Repo<b>Reel</b></div>
      <h1>Watch your codebase <span class="grad">being born</span>.</h1>
      <div class="sub">Any repo. 100% in your browser. Nothing uploaded.</div>
    </div>
  </body>
</html>
